# Nginx configuration

server {
    listen 80;
    server_name resourcemanager.datainsider.co;

    client_max_body_size 100M;
    index index.html;
    error_log  /var/log/nginx/error.log;
    #access_log /var/log/nginx/access.log;
    root /var/www/html/public;

    location / {
   	 proxy_pass http://resourcemanager:8088;
    }
}
