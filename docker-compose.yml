version: "3"

services:
  mysql:
    image: mysql:5.7
    container_name: di-mysql
    command: mysqld --user=root --verbose
    restart: always
    volumes:     
     - ./mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: "your-database"
      MYSQL_USER: "your-user"
      MYSQL_PASSWORD: "use-strong-password-here"
      MYSQL_ROOT_PASSWORD: "root-password-here"
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    
  ssdb:
    image: datainsiderco/ssdb:0.1
    container_name: ssdb
    ports:
     - "8888:8888"
    volumes:
      - ./ssdb/ssdb.conf:/usr/local/ssdb/ssdb.conf
      - ./ssdb/data:/usr/local/ssdb/var/data

  clickhouse:
    image: yandex/clickhouse-server:20.9.2.20
    container_name: clickhouse_server_di
    restart: always
    ulimits:
      nproc: 65535
      nofile: 262144
    volumes:
      - ./clickhouse:/var/lib/clickhouse
    ports:
      - 8123:8123
      - 9000:9000

  di-user-profile:
    image: datainsiderco/user-profile:0.1
    container_name: di-user-profile
    restart: always
    environment:
      NAME: user-profile
      MODE: development      
    ports:
      - "8580:8580"
      - "8589:8589"
      - "9990:9990"
    volumes:
      - ./user-profile/conf:/app/conf
      - ./user-profile/logs:/app/logs

  ingestion_service:
    image: datainsiderco/ingestion-service:0.1
    container_name: di-ingestion-service
    restart: always
    environment:
      NAME: ingestion-service
      MODE: development
      HTTP_PORT: 8489
      THRIFT_PORT: 8487
    ports:
      - "8489:8489"
      - "8487:8487"
    volumes:
      - ./ingestion-service/conf:/app/conf
      - ./ingestion-service/logs:/app/logs

  bi_service:
    image: datainsiderco/rocket-bi-service:0.1
    container_name: di-rocket-bi-service
    restart: always
    environment:
      NAME: bi-service
      MODE: development
      HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./rocket-bi-service/conf:/app/conf
      - ./rocket-bi-service/logs:/app/logs

  datainsider-web:
    image: datainsiderco/rocket-bi-web:dev
    restart: always
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 30s
    ports:
      - 5050:8080

networks:
  default:
    external:
      name: di_dev_network